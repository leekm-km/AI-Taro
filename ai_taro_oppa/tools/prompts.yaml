width: 640
height: 960
steps: 20
cfg: 7.0
sampler: "DPM++ 2M Karras"
timeout_sec: 900

common: >
  ornate tarot card illustration, sharp clean line art, centered composition,
  detailed symbolism, consistent deck style, high resolution print quality,
  readable Korean title at top, full ornate border

negative: >
  blurry, lowres, noise, messy composition, pastel overload, haze, fog,
  low contrast, overexposed, underexposed, washed out, desaturated,
  missing symbols, indistinct objects, cropped subject, off-frame,
  duplicate heads, extra limbs, bad hands, bad anatomy, distorted face,
  watermark, logo, jpeg artifacts, illegible text, text box

generate_minors: true

# -------- 22 Major Arcana (symbols made explicit) --------
major_cards:
